name: Deploy extensions to GitHub Pages

on:
  workflow_run:
    workflows: ["Main Extension Distribution Pipeline"]
    types: [completed]

permissions:
  contents: write

jobs:
  deploy:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        # gh-pages branch may not exist yet on first run
        continue-on-error: true

      - name: Ensure gh-pages directory exists
        run: mkdir -p gh-pages

      - uses: actions/download-artifact@v4
        with:
          pattern: 'duck_slug-*-extension-*'
          path: /tmp/artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Arrange extensions in repository layout
        run: |
          touch gh-pages/.nojekyll
          for artifact_dir in /tmp/artifacts/duck_slug-*/; do
            artifact_name=$(basename "$artifact_dir")
            # artifact_name format: duck_slug-{duckdb_version}-extension-{arch}
            duckdb_version=$(echo "$artifact_name" | sed 's/duck_slug-\(.*\)-extension-.*/\1/')
            arch=$(echo "$artifact_name" | sed 's/duck_slug-.*-extension-\(.*\)/\1/')
            ext_file="$artifact_dir/duck_slug.duckdb_extension"
            [ -f "$ext_file" ] || continue
            mkdir -p "gh-pages/$duckdb_version/$arch"
            gzip -9 -c "$ext_file" > "gh-pages/$duckdb_version/$arch/duck_slug.duckdb_extension.gz"
            echo "Staged: $duckdb_version/$arch/duck_slug.duckdb_extension.gz"
          done

      - name: Push to gh-pages
        run: |
          cd gh-pages
          # Init fresh repo (works whether checkout succeeded or failed)
          rm -rf .git
          git init -b gh-pages
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "Nothing new to deploy." && exit 0
          git commit -m "deploy: extensions from workflow run ${{ github.event.workflow_run.id }}"
          git push --force origin gh-pages
